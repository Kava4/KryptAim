name: Sync Wiki

on:
  workflow_dispatch:
  push:
    branches: [Beta, main]
    paths:
      - "wiki/**"
      - ".github/workflows/wiki-sync.yml"

permissions:
  contents: write

jobs:
  sync-wiki:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Publish wiki/
        uses: Andrew-Chen-Wang/github-wiki-action@v4
        with:
          path: wiki
          strategy: clone
          ignore: WIKI-UPLOAD.md
          commit-message: "Sync wiki from repo wiki/ folder"

      - name: Wiki not initialized hint
        if: failure()
        run: |
          echo "::error::GitHub Wiki git repo does not exist yet."
          echo "Open https://github.com/${{ github.repository }}/wiki"
          echo "Click 'Create the first page', title Home, save once, then re-run this workflow."
