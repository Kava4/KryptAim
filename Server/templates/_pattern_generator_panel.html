<div class="pattern-generator-root space-y-4" data-embedded="{{ 'true' if embedded else 'false' }}">
    <div class="grid grid-cols-1 {{ 'lg:grid-cols-3' if embedded else 'xl:grid-cols-4' }} gap-4">
        <div class="{{ 'lg:col-span-2' if embedded else 'xl:col-span-3' }} space-y-3">
            <div class="flex items-center justify-between gap-3">
                <input type="file" data-pg="file-input" accept=".png,.jpg,.jpeg,.webp,.gif" class="text-xs text-white/70 bg-neutral-800 border border-white/10 rounded-lg px-3 py-2 w-full" />
                <button type="button" data-pg="detect-btn" class="text-xs font-semibold text-blue-300 bg-blue-500/10 border border-blue-400/20 rounded-lg px-3 py-2 hover:bg-blue-500/20 transition-colors">Auto-Suggest</button>
            </div>
            <div class="flex items-center justify-between gap-3">
                <input type="url" data-pg="url-input" placeholder="https://.../spray.gif or image.png" class="text-xs text-white/70 bg-neutral-800 border border-white/10 rounded-lg px-3 py-2 w-full" />
                <button type="button" data-pg="load-url-btn" class="text-xs font-semibold text-indigo-300 bg-indigo-500/10 border border-indigo-400/20 rounded-lg px-3 py-2 hover:bg-indigo-500/20 transition-colors whitespace-nowrap">Load URL</button>
            </div>

            <div class="bg-neutral-950 border border-white/10 rounded-lg p-3">
                <canvas data-pg="canvas" class="w-full rounded-lg bg-neutral-900 cursor-crosshair min-h-[420px]"></canvas>
                <div data-pg="frame-controls" class="hidden mt-2 flex items-center gap-3">
                    <input type="range" min="0" max="0" step="1" value="0" data-pg="frame-slider" class="w-full accent-blue-500" />
                    <span data-pg="frame-label" class="text-[11px] text-white/50 tabular-nums whitespace-nowrap">Frame 1/1</span>
                </div>
                <p class="text-[11px] text-white/40 mt-2">Click bullet points in order. Right-click on canvas to undo last point.</p>
            </div>

            <div class="grid grid-cols-2 md:grid-cols-4 gap-3">
                <label class="text-xs text-white/70">Delay (ms)
                    <input type="number" data-pg="delay-ms" value="100" min="1" class="w-full mt-1 text-xs text-white/80 bg-neutral-800 border border-white/10 rounded-lg px-2 py-1.5" />
                </label>
                <label class="text-xs text-white/70">Scale X
                    <input type="number" data-pg="scale-x" value="1" step="0.1" class="w-full mt-1 text-xs text-white/80 bg-neutral-800 border border-white/10 rounded-lg px-2 py-1.5" />
                </label>
                <label class="text-xs text-white/70">Scale Y
                    <input type="number" data-pg="scale-y" value="1" step="0.1" class="w-full mt-1 text-xs text-white/80 bg-neutral-800 border border-white/10 rounded-lg px-2 py-1.5" />
                </label>
                <div class="text-xs text-white/70 flex items-end gap-3 pb-1">
                    <label><input type="checkbox" data-pg="invert-x" checked /> Invert X</label>
                    <label><input type="checkbox" data-pg="invert-y" checked /> Invert Y</label>
                </div>
            </div>
            <div class="grid grid-cols-1 md:grid-cols-2 gap-3">
                <label class="text-xs text-white/70">Export Mode
                    <select data-pg="export-mode" class="w-full mt-1 text-xs text-white/80 bg-neutral-800 border border-white/10 rounded-lg px-2 py-1.5">
                        <option value="canonical" selected>Canonical 1:1 (weapon_data format)</option>
                        <option value="engine_steps">Engine Steps (delta, ms)</option>
                    </select>
                </label>
                <div class="text-[11px] text-white/40 pt-5">
                    Canonical writes absolute points with delay in seconds (e.g. <span class="font-mono">0.1</span>).
                </div>
            </div>
        </div>

        <div class="space-y-3 {{ '' if embedded else 'xl:sticky xl:top-4 self-start' }}">
            <div class="bg-neutral-900 border border-white/10 rounded-lg p-3">
                <div class="flex items-center justify-between">
                    <p class="text-xs font-semibold text-white">Bullet Points</p>
                    <button type="button" data-pg="clear-points" class="text-[11px] text-red-300 hover:text-red-200">Clear</button>
                </div>
                <div data-pg="points-list" class="mt-2 max-h-[48vh] overflow-y-auto space-y-1 text-xs"></div>
            </div>
            <div class="bg-neutral-900 border border-white/10 rounded-lg p-3">
                <p class="text-xs text-white/60">Generator now outputs pattern text only. Paste it in Recoil Lab <span class="font-mono">Pattern</span> field.</p>
            </div>
        </div>
    </div>

    <div class="bg-neutral-900 border border-white/10 rounded-lg p-3 space-y-3">
        <div class="flex flex-wrap gap-2">
            <button type="button" data-pg="generate-btn" class="text-xs font-semibold text-cyan-300 bg-cyan-500/10 border border-cyan-400/20 rounded-lg px-3 py-2 hover:bg-cyan-500/20 transition-colors">Generate Pattern</button>
            <button type="button" data-pg="copy-btn" class="text-xs font-semibold text-blue-200 bg-blue-500/10 border border-blue-400/20 rounded-lg px-3 py-2 hover:bg-blue-500/20 transition-colors">Copy Pattern</button>
            <button type="button" data-pg="send-lab-btn" class="text-xs font-semibold text-emerald-200 bg-emerald-500/10 border border-emerald-400/20 rounded-lg px-3 py-2 hover:bg-emerald-500/20 transition-colors">Send to Recoil Lab</button>
        </div>
        <textarea data-pg="output" rows="6" readonly class="w-full text-xs font-mono text-white/70 bg-neutral-950 border border-white/10 rounded-lg px-3 py-2"></textarea>
        <p data-pg="status" class="text-xs text-white/40">Ready.</p>
    </div>
</div>
