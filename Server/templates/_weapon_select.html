<div id="weapon-select-container">
    {% if games[config.active_game].supported %}
    <div class="flex items-center justify-between">
        <div>
            <p class="text-sm font-medium text-white">Weapon</p>
            <p class="text-xs text-white/40">Select the weapon to compensate for.</p>
        </div>
        <select
            id="game-weapon"
            name="weapon"
            hx-post="/api/recoil/game_weapon"
            hx-trigger="change"
            hx-swap="none"
            class="text-xs text-white/70 bg-neutral-800 border border-white/10 rounded-lg px-3 py-1.5 outline-none cursor-pointer hover:border-white/20 transition-colors">
            {% for weapon in weapons %}
                <option value="{{ weapon }}" {{ 'selected' if config.recoil_game_settings.weapon == weapon }}>
                    {{ weapon.replace('_', ' ').upper() }}
                </option>
            {% endfor %}
        </select>
    </div>
    {% else %}
    <div class="flex items-start gap-3 p-4 rounded-lg bg-neutral-800/50 border border-white/5 text-white/50 text-xs">
        <svg class="w-5 h-5 text-amber-500/50 shrink-0" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
            <path d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
        <div>
            <p class="font-semibold text-white/70 mb-1 uppercase tracking-wide">Under Development</p>
            <p>Recoil profiles for this game are not yet implemented. Official patterns for {{ games[config.active_game].name }} are coming soon!</p>
        </div>
    </div>
    {% endif %}
</div>
