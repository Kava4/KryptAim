    <footer class="mt-12 bg-neutral-900 border-t border-white/10 py-8 px-6">
        <div class="max-w-6xl mx-auto flex flex-col sm:flex-row items-center justify-between gap-6">
            {% if show_integrity_check %}
            <div class="flex items-center gap-4">
                <div class="w-10 h-10 bg-neutral-800/50 border border-white/10 rounded-lg flex items-center justify-center">
                    <svg class="w-5 h-5 text-blue-400/80" fill="none" stroke="currentColor" stroke-width="1.75" viewBox="0 0 24 24">
                        <path d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z" stroke-linecap="round" stroke-linejoin="round"/>
                    </svg>
                </div>
                <div hx-get="/api/recoil/hardware-check" hx-trigger="load">
                    <span class="text-white/20 text-[10px] animate-pulse uppercase tracking-widest">Analyzing Integrity...</span>
                </div>
            </div>
            {% else %}
            <p class="text-white/35 text-xs">More from our GitHub — open source tools & experiments.</p>
            {% endif %}
            <div class="flex flex-wrap items-center justify-center sm:justify-end gap-3">
                <button type="button" id="footer-update-btn" onclick="AimSyncUpdates.install()"
                        class="hidden inline-flex items-center gap-2 px-4 py-2 rounded-lg border border-blue-400/40 bg-blue-500/15 text-blue-100 hover:bg-blue-500/25 transition-all text-xs font-semibold"
                        title="Install update">
                    Update available
                </button>
                <p class="text-white/20 text-[11px] uppercase tracking-widest font-medium">© 2026 {{ app_name }}</p>
            </div>
        </div>
    </footer>
